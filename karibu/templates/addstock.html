{% extends "base.html" %}
{% load crispy_forms_tags %}
{% load static%}
{% block title %}Add Stock{% endblock %}

{% block content %}
<div class="flex-grow flex justify-center items-end bg-teal text-green">
    <form action="" method="POST" class="bg-white p-8 rounded shadow-md w-full max-w-md mb-8">
        <h3 class="text-center font-bold text-xl mb-6">Add Stock Form</h3>
        {% csrf_token %}
        {{ form.as_p }}

        <div class="flex justify-center gap-4 mt-4">
            <a href="{% url 'allstock' %}" class="px-4 py-2 bg-gray-500 text-white rounded hover:bg-gray-600">
                <i class="fas fa-arrow-left mr-2"></i>Back
            </a>
            <input type="submit" value="Submit" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">
        </div>
    </form>
</div>
{% endblock %}

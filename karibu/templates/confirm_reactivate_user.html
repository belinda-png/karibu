{% extends 'base.html' %}
{% block title %}Activate User{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10 p-6 bg-white rounded-lg shadow">
    <h2 class="text-2xl font-bold mb-6 text-center">Activate User</h2>
    
    <div class="mb-6">
        <p class="text-gray-700">Are you sure you want to activate the user <span class="font-semibold">{{ user.username }}</span>?</p>
        <p class="text-sm text-gray-500 mt-2">This will allow the user to log in and access the system again.</p>
    </div>
    
    <form method="POST">
        {% csrf_token %}
        
        <div class="mt-6 flex justify-between">
            <a href="{% url 'user_list' %}" class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-4 py-2 rounded">
                Cancel
            </a>
            <button type="submit" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded">
                Activate User
            </button>
        </div>
    </form>
</div>
{% endblock %}

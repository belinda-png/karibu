{% extends 'base.html' %}
{% block title %}Add New User{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10 p-6 bg-white rounded-lg shadow">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold">Add New User</h2>
        <a href="{% url 'user_list' %}" class="text-gray-600 hover:text-gray-900">
            <i class="fas fa-times text-xl"></i>
        </a>
    </div>
    
    <form method="POST">
        {% csrf_token %}
        
        <div class="space-y-4 bg-teal text-green">
            {% for field in form %}
            <div>
                <label class="block text-sm font-medium text-gray-700">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <p class="mt-1 text-sm text-red-600">{{ field.errors|join:", " }}</p>
                {% endif %}
            </div>
            {% endfor %}
        </div>
        
        <div class="mt-6 flex justify-between gap-4">
            <a href="{% url 'user_list' %}" class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 px-4 py-2 rounded text-center">
                <i class="fas fa-arrow-left mr-2"></i>Back
            </a>
            <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded">
                <i class="fas fa-save mr-2"></i>Create User
            </button>
        </div>
    </form>
</div>
{% endblock %}
